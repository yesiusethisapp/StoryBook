<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avni & Rana — The Brave Knight</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:#0a0d1a;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;overflow:hidden}
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0}
.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:24px 12px 16px}
.book{position:relative;width:min(740px,96vw);height:clamp(300px,48vw,500px);perspective:3200px;filter:drop-shadow(0 30px 65px rgba(0,0,0,.95))}
.spine{position:absolute;left:50%;top:0;width:14px;height:100%;transform:translateX(-50%);background:linear-gradient(to right,#1a0a2e,#4a2070,#6a30a0,#4a2070,#1a0a2e);z-index:50;box-shadow:0 0 18px rgba(0,0,0,.8)}
.page-left{position:absolute;left:0;top:0;width:calc(50% - 7px);height:100%;border-radius:3px 0 0 3px;overflow:hidden}
.page-left::after{content:'';position:absolute;top:0;right:0;width:28px;height:100%;background:linear-gradient(to right,transparent,rgba(0,0,0,.2));pointer-events:none;z-index:5}
.prw{position:absolute;right:0;top:0;width:calc(50% - 7px);height:100%;transform-origin:left center;transform-style:preserve-3d;z-index:10}
.prw.go{transition:transform 1.5s cubic-bezier(.645,.045,.355,1)}
.prw.flipped{transform:rotateY(-180deg)}
.pface{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden}
.pface.front{border-radius:0 3px 3px 0;box-shadow:4px 0 20px rgba(0,0,0,.4)}
.pface.back{transform:rotateY(180deg);border-radius:3px 0 0 3px}
.pface canvas.bg{position:absolute;inset:0;width:100%;height:100%;display:block}
.pface canvas.art{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}
.pcontent{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(24px,6%,52px) clamp(18px,6%,46px);z-index:3}
.pnum{position:absolute;bottom:14px;width:100%;text-align:center;font-size:11px;color:#8878b0;letter-spacing:4px;z-index:4}
.cover-title{font-family:'Cinzel',serif;font-size:clamp(18px,3.8vw,34px);font-weight:700;color:#2a1845;letter-spacing:2px;line-height:1.25}
.cover-title em{font-style:italic;color:#5a2888;font-family:'Lora',serif}
.divider{width:60px;height:1px;background:rgba(90,50,140,.4);margin:12px auto}
.cover-sub{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:#6a4898;font-weight:400}
.story{font-size:clamp(12px,1.9vw,19px);line-height:2.15;color:#1e1438;font-weight:400}
.story em{font-style:italic;color:#5a1880;font-size:clamp(13px,2.1vw,20px)}
.story strong{font-weight:500;color:#2a1448}
.gap{display:block;height:12px}
.finale{font-family:'Cinzel',serif;font-size:clamp(16px,3.2vw,28px);font-weight:700;color:#2a1845;letter-spacing:3px;line-height:1.5}
.finale em{font-style:italic;font-family:'Lora',serif;color:#5a2888;display:block;font-size:.72em;letter-spacing:1px;margin-top:10px;font-weight:400}
.nav{margin-top:22px;display:flex;align-items:center;gap:22px}
.nbtn{background:transparent;border:1px solid rgba(130,90,200,.35);color:#9878d0;padding:8px 22px;cursor:pointer;font-family:'Lora',serif;font-size:14px;letter-spacing:3px;text-transform:uppercase;transition:all .3s;border-radius:2px;outline:none}
.nbtn:hover:not(:disabled){background:rgba(130,90,200,.1);border-color:rgba(130,90,200,.7)}
.nbtn:disabled{opacity:.18;cursor:default}
.nind{font-size:13px;color:rgba(150,120,200,.45);letter-spacing:2px;min-width:52px;text-align:center}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="scene">
  <div class="book">
    <div class="spine"></div>
    <div class="page-left">
      <canvas class="bg" id="bgL" width="370" height="500"></canvas>
      <canvas class="art" id="artL" width="370" height="500"></canvas>
      <div class="pcontent" id="ctL"></div>
      <div class="pnum" id="nmL"></div>
    </div>
    <div class="prw" id="prw">
      <div class="pface front">
        <canvas class="bg" id="bgF" width="370" height="500"></canvas>
        <canvas class="art" id="artF" width="370" height="500"></canvas>
        <div class="pcontent" id="ctF"></div>
        <div class="pnum" id="nmF"></div>
      </div>
      <div class="pface back">
        <canvas class="bg" id="bgB" width="370" height="500"></canvas>
        <canvas class="art" id="artB" width="370" height="500"></canvas>
        <div class="pcontent" id="ctB"></div>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nbtn" id="bPrev">← Back</button>
    <span class="nind" id="nind">1 / 8</span>
    <button class="nbtn" id="bNext">Next →</button>
  </div>
</div>

<script>
// ── Starfield ────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('starfield'),x=c.getContext('2d');let stars=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;stars=Array.from({length:140},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+.2,a:Math.random(),da:(Math.random()-.5)*.006}))}
  function draw(){x.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.a=Math.max(.04,Math.min(1,s.a+s.da));if(s.a<=.04||s.a>=1)s.da*=-1;x.globalAlpha=s.a*.6;x.fillStyle=Math.random()>.7?'#c8d8ff':'#fff8e0';x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill()});x.globalAlpha=1;requestAnimationFrame(draw)}
  resize();draw();window.addEventListener('resize',resize);
})();

// ── Page background ───────────────────────────────────────────────────────────
function clamp(v){return Math.max(0,Math.min(255,v|0))}
function drawBg(cv,type){
  const c=cv.getContext('2d'),W=cv.width,H=cv.height;
  c.fillStyle=type==='cover'?'#f0eaf8':type==='finale'?'#eef5ff':'#f5f0fc';c.fillRect(0,0,W,H);
  const id=c.getImageData(0,0,W,H),d=id.data;
  for(let i=0;i<d.length;i+=4){const n=(Math.random()-.5)*14;d[i]=clamp(d[i]+n*.6);d[i+1]=clamp(d[i+1]+n*.55);d[i+2]=clamp(d[i+2]+n)}
  c.putImageData(id,0,0);
  const g=c.createRadialGradient(W/2,H/2,H*.22,W/2,H/2,H*.9);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(15,5,35,${type==='cover'?.2:.1})`);c.fillStyle=g;c.fillRect(0,0,W,H);
  c.strokeStyle='rgba(80,40,130,.3)';c.lineWidth=.9;c.strokeRect(18,18,W-36,H-36);
  c.strokeStyle='rgba(80,40,130,.13)';c.lineWidth=.5;c.strokeRect(24,24,W-48,H-48);
  [[18,18,0],[W-18,18,Math.PI/2],[W-18,H-18,Math.PI],[18,H-18,-Math.PI/2]].forEach(([x,y,a])=>{c.save();c.translate(x,y);c.rotate(a);c.strokeStyle='rgba(80,40,130,.45)';c.lineWidth=.9;c.beginPath();c.moveTo(14,0);c.lineTo(0,0);c.lineTo(0,14);c.stroke();c.fillStyle='rgba(80,40,130,.4)';c.save();c.rotate(Math.PI/4);c.fillRect(-2.5,-2.5,5,5);c.restore();c.restore()});
}

// ── Drawing primitives ────────────────────────────────────────────────────────
function twinkle(c,W,H,n=12){
  const pts=[[.1,.06],[.88,.04],[.93,.18],[.05,.3],[.96,.86],[.04,.78],[.91,.9],[.5,.03],[.48,.97],[.77,.13],[.2,.87],[.03,.52],[.95,.52],[.62,.07]];
  for(let i=0;i<Math.min(n,pts.length);i++){c.save();c.globalAlpha=.2+Math.random()*.4;c.fillStyle='#c8d0ff';c.beginPath();c.arc(pts[i][0]*W,pts[i][1]*H,.4+Math.random()*.6,0,Math.PI*2);c.fill();c.restore()}
}
function moonFull(c,x,y,r,a=.2){
  c.save();c.globalAlpha=a;
  const g=c.createRadialGradient(x,y,r*.3,x,y,r*2.2);g.addColorStop(0,'rgba(220,210,255,.25)');g.addColorStop(1,'transparent');
  c.fillStyle=g;c.beginPath();c.arc(x,y,r*2.2,0,Math.PI*2);c.fill();
  c.globalAlpha=a*1.1;c.fillStyle='#e8e0ff';c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  c.globalAlpha=a*.5;c.fillStyle='#c8c0e8';[[x-r*.25,y-r*.15,r*.08],[x+r*.2,y+r*.2,r*.06],[x-r*.1,y+r*.3,r*.05]].forEach(([cx,cy,cr])=>{c.beginPath();c.arc(cx,cy,cr,0,Math.PI*2);c.fill()});
  c.restore();
}
function starShape(c,x,y,outer,inner,pts,col,a){
  c.save();c.globalAlpha=a;c.fillStyle=col;c.beginPath();
  for(let i=0;i<pts*2;i++){const angle=i*Math.PI/pts-Math.PI/2,r=i%2===0?outer:inner;i===0?c.moveTo(x+r*Math.cos(angle),y+r*Math.sin(angle)):c.lineTo(x+r*Math.cos(angle),y+r*Math.sin(angle))}
  c.closePath();c.fill();c.restore();
}
function heart(c,x,y,s,col,a){
  c.save();c.globalAlpha=a;c.fillStyle=col;c.beginPath();
  c.moveTo(x,y+s*.35);c.bezierCurveTo(x,y+s*.08,x-s,y-s*.28,x-s,y);c.bezierCurveTo(x-s,y+s*.52,x,y+s*.82,x,y+s);c.bezierCurveTo(x,y+s*.82,x+s,y+s*.52,x+s,y);c.bezierCurveTo(x+s,y-s*.28,x,y+s*.08,x,y+s*.35);
  c.fill();c.restore();
}
function flower(c,x,y,r,col,a){
  c.save();c.globalAlpha=a;c.fillStyle=col;
  for(let i=0;i<6;i++){c.save();c.translate(x,y);c.rotate(i*Math.PI/3);c.beginPath();c.ellipse(r*.62,0,r*.38,r*.18,0,0,Math.PI*2);c.fill();c.restore()}
  c.beginPath();c.arc(x,y,r*.24,0,Math.PI*2);c.fill();c.restore();
}
function cornerStars(c,W,H){[[38,38],[W-38,38],[38,H-38],[W-38,H-38]].forEach(([x,y])=>starShape(c,x,y,9,4,5,'#7040b0',.12))}
function hills(c,W,H,col,a){
  c.save();c.globalAlpha=a;c.fillStyle=col;
  c.beginPath();c.moveTo(0,H);c.lineTo(0,H*.72);c.bezierCurveTo(W*.15,H*.58,W*.3,H*.68,W*.5,H*.62);c.bezierCurveTo(W*.7,H*.56,W*.85,H*.66,W,H*.72);c.lineTo(W,H);c.closePath();c.fill();
  c.globalAlpha=a*.65;c.beginPath();c.moveTo(0,H);c.lineTo(0,H*.82);c.bezierCurveTo(W*.2,H*.74,W*.4,H*.82,W*.6,H*.76);c.bezierCurveTo(W*.8,H*.7,W*.9,H*.8,W,H*.82);c.lineTo(W,H);c.closePath();c.fill();c.restore();
}
function cloud(c,x,y,sc,a){
  c.save();c.globalAlpha=a;c.fillStyle='#e8e0ff';
  [[0,0,18],[18,-8,14],[36,0,16],[52,2,12],[-16,2,12]].forEach(([ox,oy,r])=>{c.beginPath();c.arc(x+ox*sc,y+oy,r*sc,0,Math.PI*2);c.fill()});c.restore();
}
function magicSparkles(c,W,H,n,col){
  col=col||'#e0d0ff';for(let i=0;i<n;i++){const x=W*(.15+Math.random()*.7),y=H*(.1+Math.random()*.5);starShape(c,x,y,4+Math.random()*4,2,4,col,.1+Math.random()*.2)}
}

// ── Characters ────────────────────────────────────────────────────────────────
function princess(c,cx,cy,sc,a){
  sc=sc||1;a=a||.9;c.save();c.translate(cx,cy);c.scale(sc,sc);c.globalAlpha=a;
  // dress
  c.fillStyle='#c060a0';c.beginPath();c.moveTo(-2,-28);c.bezierCurveTo(-22,-10,-28,10,-22,30);c.lineTo(22,30);c.bezierCurveTo(28,10,22,-10,2,-28);c.fill();
  c.fillStyle='#e080c0';c.globalAlpha=a*.35;c.beginPath();c.moveTo(-1,-26);c.bezierCurveTo(-8,-12,-10,4,-6,22);c.lineTo(-2,22);c.bezierCurveTo(-6,4,-4,-12,1,-26);c.fill();c.globalAlpha=a;
  // bodice
  c.fillStyle='#a04080';c.beginPath();c.roundRect(-7,-38,14,12,2);c.fill();
  // arms
  c.strokeStyle='#e8b090';c.lineWidth=4;c.lineCap='round';
  c.beginPath();c.moveTo(-7,-34);c.lineTo(-16,-26);c.stroke();
  c.beginPath();c.moveTo(7,-34);c.lineTo(16,-26);c.stroke();
  // head
  c.fillStyle='#e8b090';c.beginPath();c.arc(0,-46,10,0,Math.PI*2);c.fill();
  // hair
  c.fillStyle='#3a1808';c.beginPath();c.arc(0,-46,10,-Math.PI,0);c.bezierCurveTo(12,-36,18,-10,14,20);c.lineTo(10,20);c.bezierCurveTo(14,-10,8,-36,0,-46);c.fill();
  c.beginPath();c.bezierCurveTo(-12,-36,-18,-10,-14,20);c.lineTo(-10,20);c.bezierCurveTo(-14,-10,-8,-36,0,-46);c.fill();
  // crown
  c.fillStyle='#f0c030';c.beginPath();c.moveTo(-9,-55);c.lineTo(-9,-50);c.lineTo(-4,-53);c.lineTo(0,-56);c.lineTo(4,-53);c.lineTo(9,-50);c.lineTo(9,-55);c.closePath();c.fill();
  c.fillStyle='#fff0a0';c.beginPath();c.arc(0,-53,2,0,Math.PI*2);c.fill();
  // face
  c.fillStyle='#3a1808';c.globalAlpha=a*.8;
  c.beginPath();c.arc(-3,-47,1.2,0,Math.PI*2);c.fill();c.beginPath();c.arc(3,-47,1.2,0,Math.PI*2);c.fill();
  c.strokeStyle='#c06080';c.lineWidth=1;c.beginPath();c.arc(0,-44,2.5,.2,Math.PI-.2);c.stroke();c.restore();
}

function knight(c,cx,cy,sc,a,facingLeft){
  sc=sc||1;a=a||.9;c.save();c.translate(cx,cy);c.scale(facingLeft?-sc:sc,sc);c.globalAlpha=a;
  // legs
  c.fillStyle='#607080';c.beginPath();c.roundRect(-9,20,8,22,2);c.fill();c.beginPath();c.roundRect(1,20,8,22,2);c.fill();
  c.fillStyle='#3a2810';c.beginPath();c.roundRect(-10,38,10,8,2);c.fill();c.beginPath();c.roundRect(0,38,10,8,2);c.fill();
  // armour body
  c.fillStyle='#8090a8';c.beginPath();c.roundRect(-11,-10,22,32,3);c.fill();
  c.fillStyle='#b0c0d0';c.globalAlpha=a*.3;c.beginPath();c.roundRect(-8,-8,8,26,2);c.fill();c.globalAlpha=a;
  c.fillStyle='#3a2810';c.beginPath();c.roundRect(-11,18,22,5,1);c.fill();
  c.fillStyle='#e0c020';c.beginPath();c.arc(0,20,3,0,Math.PI*2);c.fill();
  // pauldrons
  c.fillStyle='#7080a0';c.beginPath();c.ellipse(-13,-8,8,5,-.3,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(13,-8,8,5,.3,0,Math.PI*2);c.fill();
  // sword arm
  c.strokeStyle='#8090a8';c.lineWidth=6;c.lineCap='round';c.beginPath();c.moveTo(13,-8);c.lineTo(22,10);c.stroke();
  c.save();c.translate(22,10);c.rotate(.5);
  c.fillStyle='#c8d0d8';c.beginPath();c.roundRect(-2,-28,4,28,1);c.fill();
  c.fillStyle='#e0c020';c.beginPath();c.roundRect(-6,-2,12,4,1);c.fill();
  c.fillStyle='#8a6020';c.beginPath();c.roundRect(-2,2,4,9,2);c.fill();
  c.fillStyle='#fff';c.globalAlpha=a*.5;c.beginPath();c.roundRect(-1,-26,2,14,1);c.fill();c.globalAlpha=a;c.restore();
  // shield arm
  c.strokeStyle='#8090a8';c.lineWidth=5;c.lineCap='round';c.beginPath();c.moveTo(-13,-8);c.lineTo(-20,8);c.stroke();
  c.save();c.translate(-20,8);
  c.fillStyle='#c03020';c.beginPath();c.moveTo(-8,-12);c.lineTo(8,-12);c.lineTo(8,4);c.quadraticCurveTo(0,14,-8,4);c.closePath();c.fill();
  c.strokeStyle='#e0c020';c.lineWidth=1.5;c.stroke();c.beginPath();c.moveTo(0,-11);c.lineTo(0,6);c.stroke();c.beginPath();c.moveTo(-7,-3);c.lineTo(7,-3);c.stroke();c.restore();
  // neck, helmet
  c.fillStyle='#e8b090';c.beginPath();c.roundRect(-4,-18,8,9,2);c.fill();
  c.fillStyle='#8090a8';c.beginPath();c.arc(0,-26,12,0,Math.PI*2);c.fill();
  c.fillStyle='#7080a0';c.beginPath();c.arc(0,-26,12,Math.PI,0);c.fill();
  c.fillStyle='#506070';c.beginPath();c.roundRect(-10,-28,20,6,2);c.fill();
  c.fillStyle='#c0d0e0';c.globalAlpha=a*.25;c.beginPath();c.arc(-3,-30,4,0,Math.PI*2);c.fill();c.globalAlpha=a;
  // plume
  c.strokeStyle='#e03030';c.lineWidth=3;c.lineCap='round';
  c.beginPath();c.moveTo(2,-38);c.quadraticCurveTo(10,-50,6,-58);c.stroke();
  c.beginPath();c.moveTo(4,-40);c.quadraticCurveTo(12,-52,8,-60);c.stroke();c.restore();
}

function dragon(c,cx,cy,sc,a){
  sc=sc||1;a=a||.88;c.save();c.translate(cx,cy);c.scale(sc,sc);c.globalAlpha=a;
  // tail
  c.strokeStyle='#206030';c.lineWidth=10;c.lineCap='round';c.beginPath();c.moveTo(30,20);c.quadraticCurveTo(65,40,75,20);c.stroke();
  c.lineWidth=6;c.beginPath();c.moveTo(75,20);c.quadraticCurveTo(88,5,82,-5);c.stroke();
  c.fillStyle='#a0c020';c.globalAlpha=a*.55;[[55,22],[68,28],[78,14]].forEach(([x,y])=>{c.beginPath();c.moveTo(x,y);c.lineTo(x-4,y-10);c.lineTo(x+4,y-10);c.closePath();c.fill()});c.globalAlpha=a;
  // body
  c.fillStyle='#287040';c.beginPath();c.ellipse(5,10,32,22,-.1,0,Math.PI*2);c.fill();
  c.fillStyle='#30904a';c.globalAlpha=a*.45;c.beginPath();c.ellipse(-2,4,20,14,-.1,0,Math.PI*2);c.fill();c.globalAlpha=a;
  c.fillStyle='#a0e060';c.globalAlpha=a*.45;c.beginPath();c.ellipse(8,16,16,10,0,0,Math.PI*2);c.fill();c.globalAlpha=a;
  // wing
  c.fillStyle='#186030';c.globalAlpha=a*.65;c.beginPath();c.moveTo(-10,-4);c.bezierCurveTo(-40,-30,-55,-10,-45,8);c.bezierCurveTo(-35,12,-20,4,-10,-4);c.fill();
  c.strokeStyle='#104020';c.lineWidth=.8;c.globalAlpha=a*.35;[[-30,-18],[-42,-6],[-36,0]].forEach(([x,y])=>{c.beginPath();c.moveTo(-10,-4);c.lineTo(x,y);c.stroke()});c.globalAlpha=a;
  // legs
  c.strokeStyle='#1e5828';c.lineWidth=5;c.lineCap='round';c.beginPath();c.moveTo(-8,28);c.lineTo(-14,44);c.stroke();c.beginPath();c.moveTo(18,30);c.lineTo(22,44);c.stroke();
  c.fillStyle='#105020';[[-18,44],[-14,44],[-10,44]].forEach(([x,y])=>{c.beginPath();c.moveTo(x-2,y);c.lineTo(x,y+8);c.lineTo(x+2,y);c.fill()});[[18,44],[22,44],[26,44]].forEach(([x,y])=>{c.beginPath();c.moveTo(x-2,y);c.lineTo(x,y+8);c.lineTo(x+2,y);c.fill()});
  // neck + head
  c.fillStyle='#287040';c.beginPath();c.ellipse(-16,-8,12,8,-.6,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(-30,-18,18,12,-.2,0,Math.PI*2);c.fill();
  c.fillStyle='#1e6030';c.beginPath();c.ellipse(-44,-18,8,6,.1,0,Math.PI*2);c.fill();
  c.fillStyle='#104020';c.beginPath();c.arc(-47,-15,1.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(-43,-14,1.5,0,Math.PI*2);c.fill();
  c.fillStyle='#f0c020';c.beginPath();c.ellipse(-24,-22,5,4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#101010';c.beginPath();c.ellipse(-24,-22,2,3,0,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';c.globalAlpha=a*.75;c.beginPath();c.arc(-25,-24,1.2,0,Math.PI*2);c.fill();c.globalAlpha=a;
  c.fillStyle='#a0c020';[[-18,-28],[-25,-32],[-32,-30]].forEach(([x,y])=>{c.beginPath();c.moveTo(x,y);c.lineTo(x+2,y-10);c.lineTo(x+5,y);c.fill()});
  // fire breath
  c.save();c.translate(-52,-16);

    setTimeout(()=>{cur++;const s=S[cur];drawBg(bgL,s.L.type);drawArt(artL,cur,'L');ctL.innerHTML=s.L.h;nmL.textContent=s.n[0];drawBg(bgF,s.R.type);drawArt(artF,cur,'R');ctF.innerHTML=s.R.h;nmF.textContent=s.n[1];loadBack(cur+1);prw.classList.remove('go','flipped');nind.textContent=`${cur+1} / ${S.length}`;bPrev.disabled=cur===0;bNext.disabled=cur===S.length-1;busy=false},1520);
  }else{
    const p=S[cur-1];drawBg(bgF,p.R.type);drawArt(artF,cur-1,'R');ctF.innerHTML=p.R.h;nmF.textContent=p.n[1];drawBg(bgB,S[cur].L.type);drawArt(artB,cur,'L');ctB.innerHTML=S[cur].L.h;
    prw.classList.remove('go');prw.classList.add('flipped');void prw.offsetHeight;
    drawBg(bgL,p.L.type);drawArt(artL,cur-1,'L');ctL.innerHTML=p.L.h;nmL.textContent=p.n[0];
    prw.classList.add('go');prw.classList.remove('flipped');
    setTimeout(()=>{cur--;loadBack(cur+1);prw.classList.remove('go');nind.textContent=`${cur+1} / ${S.length}`;bPrev.disabled=cur===0;bNext.disabled=cur===S.length-1;busy=false},1520);
  }
}
document.getElementById('bPrev').onclick=()=>go(-1);
document.getElementById('bNext').onclick=()=>go(1);
render();
</script>
